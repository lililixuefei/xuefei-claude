<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Microsoft YaHei', sans-serif;
    }

    .game-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #fff;
      margin-bottom: 20px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      color: #fff;
      font-size: 1.2em;
    }

    .score, .high-score {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 20px;
      border-radius: 10px;
    }

    canvas {
      border: 3px solid #fff;
      border-radius: 10px;
      background: #111;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .controls {
      margin-top: 20px;
      color: #fff;
    }

    .controls p {
      margin: 5px 0;
      font-size: 0.9em;
      opacity: 0.9;
    }

    .btn {
      background: #fff;
      color: #764ba2;
      border: none;
      padding: 12px 30px;
      font-size: 1.1em;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 40px;
      border-radius: 15px;
      display: none;
      text-align: center;
    }

    .game-over h2 {
      color: #ff6b6b;
      margin-bottom: 20px;
      font-size: 2em;
    }

    .game-over p {
      margin-bottom: 20px;
      font-size: 1.2em;
    }

    .canvas-wrapper {
      position: relative;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🐍 贪吃蛇</h1>
    <div class="score-board">
      <div class="score">得分: <span id="score">0</span></div>
      <div class="high-score">最高分: <span id="highScore">0</span></span></div>
    </div>
    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">重新开始</button>
      </div>
    </div>
    <div class="controls">
      <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
      <p>按空格键暂停/继续</p>
      <button class="btn" onclick="restartGame()">新游戏</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('highScore');
    const finalScoreElement = document.getElementById('finalScore');
    const gameOverScreen = document.getElementById('gameOver');

    // 游戏配置
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [];
    let food = {};
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameLoop = null;
    let gameSpeed = 100;
    let isPaused = false;
    let isGameOver = false;

    // 初始化游戏
    function initGame() {
      // 初始化蛇（从中间开始，长度3）
      const startX = Math.floor(tileCount / 2);
      const startY = Math.floor(tileCount / 2);
      snake = [
        { x: startX, y: startY },
        { x: startX - 1, y: startY },
        { x: startX - 2, y: startY }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameSpeed = 100;
      isPaused = false;
      isGameOver = false;

      highScoreElement.textContent = highScore;
      scoreElement.textContent = score;
      gameOverScreen.style.display = 'none';

      placeFood();

      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, gameSpeed);
    }

    // 放置食物
    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (isSnakeAt(food.x, food.y));
    }

    // 检查蛇是否在指定位置
    function isSnakeAt(x, y) {
      return snake.some(segment => segment.x === x && segment.y === y);
    }

    // 更新游戏状态
    function update() {
      if (isPaused || isGameOver) return;

      // 更新方向
      direction = { ...nextDirection };

      // 新的头部位置
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // 碰撞检测 - 墙壁
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
        return;
      }

      // 碰撞检测 - 自身
      if (isSnakeAt(head.x, head.y)) {
        gameOver();
        return;
      }

      // 移动蛇
      snake.unshift(head);

      // 检查是否吃到食物
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.textContent = score;

        // 更新最高分
        if (score > highScore) {
          highScore = score;
          highScoreElement.textContent = highScore;
          localStorage.setItem('snakeHighScore', highScore);
        }

        // 加速游戏
        if (gameSpeed > 50) {
          gameSpeed -= 2;
          clearInterval(gameLoop);
          gameLoop = setInterval(update, gameSpeed);
        }

        placeFood();
      } else {
        // 没吃到食物，移除尾部
        snake.pop();
      }

      draw();
    }

    // 绘制游戏
    function draw() {
      // 清空画布
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 绘制网格（可选，增加视觉效果）
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }

      // 绘制蛇
      snake.forEach((segment, index) => {
        if (index === 0) {
          // 蛇头 - 渐变效果
          const gradient = ctx.createLinearGradient(
            segment.x * gridSize, segment.y * gridSize,
            (segment.x + 1) * gridSize, (segment.y + 1) * gridSize
          );
          gradient.addColorStop(0, '#4ade80');
          gradient.addColorStop(1, '#22c55e');
          ctx.fillStyle = gradient;
        } else {
          // 蛇身 - 渐变绿色
          const greenValue = Math.max(100, 200 - index * 5);
          ctx.fillStyle = `rgb(34, ${greenValue}, 94)`;
        }

        ctx.fillRect(
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 2,
          gridSize - 2
        );

        // 绘制圆角效果
        ctx.beginPath();
        ctx.roundRect(
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 2,
          gridSize - 2,
          4
        );
        ctx.fill();
      });

      // 绘制蛇眼
      const head = snake[0];
      ctx.fillStyle = '#fff';
      const eyeSize = 3;
      const offset = 5;
      if (direction.x === 1) { // 向右
        ctx.beginPath(); ctx.arc(head.x * gridSize + 14, head.y * gridSize + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(head.x * gridSize + 14, head.y * gridSize + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
      } else if (direction.x === -1) { // 向左
        ctx.beginPath(); ctx.arc(head.x * gridSize + 6, head.y * gridSize + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(head.x * gridSize + 6, head.y * gridSize + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
      } else if (direction.y === -1) { // 向上
        ctx.beginPath(); ctx.arc(head.x * gridSize + 6, head.y * gridSize + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(head.x * gridSize + 14, head.y * gridSize + 6, eyeSize, 0, Math.PI * 2); ctx.fill();
      } else { // 向下
        ctx.beginPath(); ctx.arc(head.x * gridSize + 6, head.y * gridSize + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(head.x * gridSize + 14, head.y * gridSize + 14, eyeSize, 0, Math.PI * 2); ctx.fill();
      }

      // 绘制食物 - 发光效果
      const foodGradient = ctx.createRadialGradient(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        2,
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2
      );
      foodGradient.addColorStop(0, '#ff6b6b');
      foodGradient.addColorStop(1, '#ee5a5a');
      ctx.fillStyle = foodGradient;
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

      // 食物光晕
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // 游戏结束
    function gameOver() {
      isGameOver = true;
      clearInterval(gameLoop);
      finalScoreElement.textContent = score;
      gameOverScreen.style.display = 'block';
    }

    // 重新开始游戏
    function restartGame() {
      initGame();
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      // 防止方向键滚动页面
      if ([32, 37, 38, 39, 40].includes(e.keyCode)) {
        e.preventDefault();
      }

      // 空格键暂停
      if (e.keyCode === 32) {
        isPaused = !isPaused;
        return;
      }

      // 防止反向移动
      switch(e.keyCode) {
        case 37: // 左
          if (direction.x !== 1) {
            nextDirection = { x: -1, y: 0 };
          }
          break;
        case 38: // 上
          if (direction.y !== 1) {
            nextDirection = { x: 0, y: -1 };
          }
          break;
        case 39: // 右
          if (direction.x !== -1) {
            nextDirection = { x: 1, y: 0 };
          }
          break;
        case 40: // 下
          if (direction.y !== -1) {
            nextDirection = { x: 0, y: 1 };
          }
          break;
      }
    });

    // 启动游戏
    initGame();
  </script>
</body>
</html>
