<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <h1>🐍 贪吃蛇</h1>

    <div class="difficulty-selector">
      <span>难度选择：</span>
      <button class="diff-btn" data-diff="easy">简单</button>
      <button class="diff-btn active" data-diff="medium">中等</button>
      <button class="diff-btn" data-diff="hard">困难</button>
      <button class="diff-btn" data-diff="expert">专家</button>
    </div>

    <div class="score-board">
      <div class="score">得分: <span id="score">0</span></div>
      <div class="high-score">最高分: <span id="highScore">0</span></div>
      <div class="speed">速度: <span id="speed">1</span>x</div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="600" height="600"></canvas>
      <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>难度: <span id="finalDifficulty">-</span></p>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="game.restart()">重新开始</button>
      </div>
      <div class="pause-screen" id="pauseScreen">
        <h2>游戏暂停</h2>
        <p>按空格键继续</p>
      </div>
      <div class="start-screen" id="startScreen">
        <h2>准备好了吗？</h2>
        <p>选择难度后按空格键开始游戏</p>
      </div>
    </div>

    <div class="controls">
      <div class="control-row">
        <span class="key">↑</span>
      </div>
      <div class="control-row">
        <span class="key">←</span>
        <span class="key">↓</span>
        <span class="key">→</span>
      </div>
      <p>方向键控制移动</p>
      <p><span class="key small">空格</span> 暂停/继续</p>
      <button class="btn" onclick="game.restart()">新游戏</button>
    </div>
  </div>

  <script src="js/snake.js"></script>
</body>
</html>
